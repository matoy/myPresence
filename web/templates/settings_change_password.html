{{define "content"}}
{{with .Data}}
<div class="max-w-md mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-md p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">{{index $.T "cp.title"}}</h1>

        {{if .Error}}
        <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-5 text-red-700 text-sm">
            {{.Error}}
        </div>
        {{end}}
        {{if .Success}}
        <div class="bg-green-50 border border-green-200 rounded-xl px-4 py-3 mb-5 text-green-700 text-sm">
            {{.Success}}
        </div>
        {{end}}

        <form method="POST" action="/settings/change-password" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{index $.T "cp.current"}}</label>
                <input type="password" name="current_password" required autocomplete="current-password"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{index $.T "cp.new"}}</label>
                <input type="password" name="new_password" required autocomplete="new-password"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{index $.T "cp.confirm"}}</label>
                <input type="password" name="confirm_password" required autocomplete="new-password"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary">
            </div>
            <button type="submit"
                    class="w-full px-4 py-2.5 bg-primary text-white rounded-lg text-sm font-medium hover:opacity-90 transition mt-2">
                {{index $.T "cp.submit"}}
            </button>
        </form>
    </div>
</div>
{{end}}
{{end}}
