{{define "content"}}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary/10 via-white to-secondary/10 px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="h-16 w-16 mx-auto mb-4 rounded-xl shadow-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
                <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900">{{index .T "forgot.title"}}</h1>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            {{with .Data}}
            {{if .Sent}}
            <div class="text-center space-y-4">
                <div class="h-12 w-12 mx-auto rounded-full bg-green-100 flex items-center justify-center">
                    <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <p class="text-gray-700">{{index $.T "forgot.sent"}}</p>
                <a href="/login" class="block text-sm text-primary hover:underline mt-2">{{index $.T "forgot.back_login"}}</a>
            </div>
            {{else}}
            <p class="text-sm text-gray-500 mb-6">{{index $.T "forgot.hint"}}</p>
            <form method="POST" action="/forgot-password" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">{{index $.T "admin.email"}}</label>
                    <input type="email" name="email" id="email" required autofocus
                           placeholder="you@example.com"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary/50 focus:border-primary transition text-sm">
                </div>
                <button type="submit"
                        class="w-full py-2.5 bg-gradient-to-r from-primary to-secondary text-white rounded-xl font-medium hover:opacity-90 transition">
                    {{index $.T "forgot.submit"}}
                </button>
            </form>
            <div class="mt-5 text-center">
                <a href="/login" class="text-sm text-gray-400 hover:text-gray-600 transition">{{index $.T "forgot.back_login"}}</a>
            </div>
            {{end}}
            {{end}}
        </div>
    </div>
</div>
{{end}}
