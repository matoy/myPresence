{{define "content"}}
{{with .Data}}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8"
     x-data="{
        search: '',
        get filtered() {
            const q = this.search.toLowerCase();
            if (!q) return {{json .Users}};
            return ({{json .Users}}).filter(u =>
                u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
            );
        }
     }">

    <div class="flex items-center gap-3 mb-6">
        <a href="/" class="text-gray-400 hover:text-gray-600 transition">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-900">{{index $.T "impersonate.title"}}</h1>
    </div>

    <!-- Search -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-4">
        <input type="text"
               x-model="search"
               x-init="$nextTick(() => $el.focus())"
               placeholder="{{index $.T "impersonate.search"}}"
               autocomplete="off"
               class="w-full text-sm px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-gray-50 border-b border-gray-200">
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{{index $.T "impersonate.col_name"}}</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{{index $.T "impersonate.col_email"}}</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{{index $.T "impersonate.col_roles"}}</th>
                    <th class="px-4 py-3"></th>
                </tr>
            </thead>
            <tbody>
                    <template x-for="u in filtered" :key="u.id">
                    <tr class="border-b border-gray-100 hover:bg-amber-50 transition">
                        <td class="px-4 py-3 font-medium text-gray-800" x-text="u.name"></td>
                        <td class="px-4 py-3 text-gray-500" x-text="u.email"></td>
                        <td class="px-4 py-3 text-gray-500 text-xs" x-text="u.roles"></td>
                        <td class="px-4 py-3 text-right">
                            <form method="POST" action="/impersonate">
                                <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}">
                                <input type="hidden" name="login" :value="u.email">
                                <button type="submit"
                                        class="px-3 py-1.5 text-xs font-medium bg-amber-500 hover:bg-amber-600 text-white rounded-lg transition">
                                    {{index $.T "impersonate.login_as"}}
                                </button>
                            </form>
                        </td>
                    </tr>
                </template>
                <tr x-show="filtered.length === 0">
                    <td colspan="4" class="px-4 py-8 text-center text-gray-400 text-sm">
                        {{index $.T "impersonate.no_results"}}
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{{end}}
{{end}}
