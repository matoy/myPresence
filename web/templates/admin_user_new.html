{{define "content"}}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center gap-3 mb-6">
        <a href="/admin/users" class="text-gray-400 hover:text-gray-600 transition">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-900">➕ Create local account</h1>
    </div>

    {{with .Data}}
    {{if .Error}}
    <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-4 text-red-700 text-sm">
        {{.Error}}
    </div>
    {{end}}

    <div class="bg-white rounded-xl shadow-md p-6">
        <form method="POST" action="/admin/users" class="space-y-5" autocomplete="off">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required placeholder="user@example.com"
                       autocomplete="off"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Display name</label>
                <input type="text" name="name" required placeholder="John Doe"
                       autocomplete="off"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       autocomplete="new-password"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 text-sm">
            </div>
            <div class="flex gap-3 justify-end pt-2">
                <a href="/admin/users"
                   class="px-5 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition text-sm">
                    Cancel
                </a>
                <button type="submit"
                        class="px-6 py-2 bg-primary text-white rounded-lg font-medium hover:opacity-90 transition text-sm">
                    Create account
                </button>
            </div>
        </form>
    </div>
    {{end}}
</div>
{{end}}
