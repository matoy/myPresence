{{define "content"}}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8" x-data="newUserForm()">
    <div class="flex items-center gap-3 mb-6">
        <a href="/admin/users" class="text-gray-400 hover:text-gray-600 transition">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-900">{{index .T "users.new_title"}}</h1>
    </div>

    <div class="bg-white rounded-xl shadow-md p-6">
        <div x-show="error" x-text="error" class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-4 text-red-700 text-sm"></div>
        <div class="space-y-5" autocomplete="off">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{index .T "admin.email"}}</label>
                <input type="email" x-model="email" placeholder="user@example.com"
                       autocomplete="off"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{index .T "users.new_name"}}</label>
                <input type="text" x-model="name" placeholder="John Doe"
                       autocomplete="off"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{index .T "login.password"}}</label>
                <input type="password" x-model="password"
                       autocomplete="new-password"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 text-sm">
            </div>
            <div class="flex gap-3 justify-end pt-2">
                <a href="/admin/users"
                   class="px-5 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition text-sm">
                    {{index .T "admin.cancel"}}
                </a>
                <button @click="submit()"
                        class="px-6 py-2 bg-primary text-white rounded-lg font-medium hover:opacity-90 transition text-sm">
                    {{index .T "users.new_submit"}}
                </button>
            </div>
        </div>
    </div>
</div>
<script>
function newUserForm() {
    return {
        email: '', name: '', password: '', error: '',
        async submit() {
            this.error = '';
            const resp = await fetch('/admin/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: this.email, name: this.name, password: this.password })
            });
            if (resp.ok) { window.location.href = '/admin/users'; }
            else { const d = await resp.json(); this.error = d.error || 'Error'; }
        }
    };
}
</script>
{{end}}
