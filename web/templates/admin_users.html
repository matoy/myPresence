{{define "content"}}
{{with .Data}}
<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8" x-data="usersRolesAdmin()">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900">👤 Users &amp; Roles</h1>
        <span class="text-sm text-gray-400" x-text="filtered.length + ' user(s)'"></span>
    </div>

    {{if .Error}}
    <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-4 text-red-700 text-sm">
        {{.Error}}
    </div>
    {{end}}

    <!-- Create user form -->
    <div class="bg-white rounded-xl shadow-md p-6 mb-4">
        <h2 class="text-lg font-semibold text-gray-800 mb-3">Create a local account</h2>
        <form method="POST" action="/admin/users" class="flex flex-wrap gap-3 items-end">
            <div class="flex-1 min-w-[180px]">
                <label class="block text-xs font-medium text-gray-500 mb-1">Email</label>
                <input type="email" name="email" required placeholder="user@example.com"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 text-sm">
            </div>
            <div class="flex-1 min-w-[160px]">
                <label class="block text-xs font-medium text-gray-500 mb-1">Display name</label>
                <input type="text" name="name" required placeholder="John Doe"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 text-sm">
            </div>
            <div class="flex-1 min-w-[160px]">
                <label class="block text-xs font-medium text-gray-500 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 text-sm">
            </div>
            <button type="submit"
                    class="px-6 py-2 bg-primary text-white rounded-lg font-medium hover:opacity-90 transition text-sm">
                Create
            </button>
        </form>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-4">
        <div class="flex flex-wrap items-center gap-x-8 gap-y-3">
            <!-- Status filter -->
            <div class="flex items-center gap-2">
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Status</span>
                <div class="flex gap-1">
                    <button @click="filterActive = 'all'"
                            :class="filterActive === 'all' ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                            class="text-xs px-3 py-1.5 rounded-lg transition font-medium">All</button>
                    <button @click="filterActive = 'active'"
                            :class="filterActive === 'active' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                            class="text-xs px-3 py-1.5 rounded-lg transition font-medium">Active</button>
                    <button @click="filterActive = 'disabled'"
                            :class="filterActive === 'disabled' ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                            class="text-xs px-3 py-1.5 rounded-lg transition font-medium">Disabled</button>
                </div>
            </div>
            <!-- Role filter -->
            <div class="flex items-center gap-2 flex-wrap">
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Role</span>
                <div class="flex flex-wrap gap-1">
                    <button @click="filterRoles = []"
                            :class="filterRoles.length === 0 ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                            class="text-xs px-3 py-1.5 rounded-lg transition font-medium">All</button>
                    <template x-for="role in allRoles" :key="role.ID">
                        <button @click="toggleRoleFilter(role.ID)"
                                :class="filterRoles.includes(role.ID) ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                                class="text-xs px-3 py-1.5 rounded-lg transition font-medium"
                                x-text="role.Label">
                        </button>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Users table -->
    <div class="bg-white rounded-xl shadow-md overflow-x-auto">
        <table class="w-full">
            <thead>
                <tr class="bg-gray-50 border-b border-gray-200">
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Name</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Email</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Roles</th>
                    <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Status</th>
                    <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                <template x-for="user in filtered" :key="user.id">
                    <tr :class="{'opacity-60': user.disabled}" class="hover:bg-gray-50 transition">

                        <!-- Name -->
                        <td class="px-4 py-3 text-sm">
                            <div class="flex items-center gap-2">
                                <div class="h-7 w-7 rounded-full bg-primary/20 flex items-center justify-center text-xs font-bold text-primary flex-shrink-0"
                                     x-text="user.name.charAt(0).toUpperCase()"></div>
                            <div>
                                    <a x-show="!user._editing"
                                       :href="'/admin/users/' + user.id + '/logs'"
                                       class="font-medium text-gray-900 hover:text-primary hover:underline"
                                       x-text="user.name"></a>
                                    <span x-show="!user._editing && user.id === currentUserId"
                                          class="ml-1 text-xs bg-primary/10 text-primary px-1.5 py-0.5 rounded font-medium">You</span>
                                    <input x-show="user._editing" x-model="user._editName" type="text"
                                           class="px-2 py-1 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-primary/50 w-36">
                                </div>
                            </div>
                        </td>

                        <!-- Email -->
                        <td class="px-4 py-3 text-sm text-gray-500">
                            <span x-show="!user._editing" x-text="user.email"></span>
                            <input x-show="user._editing" x-model="user._editEmail" type="email"
                                   class="px-2 py-1 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-primary/50 w-44">
                        </td>

                        <!-- Roles (interactive badges) -->
                        <td class="px-4 py-3">
                            <div class="flex flex-wrap gap-1">
                                <template x-for="role in allRoles" :key="role.ID">
                                    <button @click="toggleRole(user, role.ID)"
                                            :class="hasRole(user, role.ID)
                                                ? 'bg-primary/15 text-primary border-primary/40 font-semibold'
                                                : 'text-gray-400 border-gray-200 hover:border-gray-400 hover:text-gray-600'"
                                            class="text-xs px-2 py-0.5 rounded-full border transition"
                                            x-text="role.Label">
                                    </button>
                                </template>
                            </div>
                        </td>

                        <!-- Status -->
                        <td class="px-4 py-3 text-center">
                            <span x-show="!user.disabled"
                                  class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Active</span>
                            <span x-show="user.disabled"
                                  class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Disabled</span>
                        </td>

                        <!-- Actions -->
                        <td class="px-4 py-3 text-right">
                            <!-- Normal mode -->
                            <div x-show="!user._editing && !user._changingPw"
                                 class="flex items-center justify-end gap-1.5 flex-wrap">
                                <button @click="startEdit(user)"
                                        class="text-xs px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition font-medium">Edit</button>
                                <button @click="user._changingPw = true"
                                        class="text-xs px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition font-medium">Password</button>
                                <button x-show="user.id !== currentUserId"
                                        @click="toggleDisabled(user)"
                                        :class="user.disabled ? 'bg-green-100 hover:bg-green-200 text-green-700' : 'bg-yellow-100 hover:bg-yellow-200 text-yellow-700'"
                                        class="text-xs px-2.5 py-1.5 rounded-lg transition font-medium"
                                        x-text="user.disabled ? 'Enable' : 'Disable'">
                                </button>
                                <button x-show="user.id !== currentUserId"
                                        @click="deleteUser(user)"
                                        class="text-xs px-2.5 py-1.5 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg transition font-medium">Delete</button>
                            </div>
                            <!-- Edit mode -->
                            <div x-show="user._editing" class="flex items-center justify-end gap-1.5">
                                <button @click="saveEdit(user)"
                                        class="text-xs px-2.5 py-1.5 bg-primary text-white rounded-lg hover:opacity-90 transition font-medium">Save</button>
                                <button @click="user._editing = false"
                                        class="text-xs px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition font-medium">Cancel</button>
                            </div>
                            <!-- Password mode -->
                            <div x-show="user._changingPw" class="flex items-center justify-end gap-1.5">
                                <input x-model="user._newPw" type="password" placeholder="New password"
                                       class="text-sm px-2 py-1 border border-gray-300 rounded focus:ring-2 focus:ring-primary/50 w-36">
                                <button @click="savePw(user)"
                                        class="text-xs px-2.5 py-1.5 bg-primary text-white rounded-lg hover:opacity-90 transition font-medium">Save</button>
                                <button @click="user._changingPw = false; user._newPw = ''"
                                        class="text-xs px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition font-medium">Cancel</button>
                            </div>
                        </td>
                    </tr>
                </template>

                <!-- Empty state -->
                <tr x-show="filtered.length === 0">
                    <td colspan="5" class="px-6 py-10 text-center text-gray-400">
                        <p class="text-base">No users match the current filters.</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const allRoles = {{json .AllRoles}};
const usersData = {{json .Users}};
const currentUserId = {{.CurrentUserID}};

function usersRolesAdmin() {
    return {
        allRoles,
        users: usersData.map(u => ({
            ...u,
            _editing: false,
            _changingPw: false,
            _newPw: '',
            _editName: '',
            _editEmail: ''
        })),
        filterActive: 'all',
        filterRoles: [],

        get filtered() {
            return this.users.filter(u => {
                if (this.filterActive === 'active' && u.disabled) return false;
                if (this.filterActive === 'disabled' && !u.disabled) return false;
                if (this.filterRoles.length > 0) {
                    const userRoleList = u.roles ? u.roles.split(',').map(r => r.trim()).filter(Boolean) : [];
                    if (!this.filterRoles.some(r => userRoleList.includes(r))) return false;
                }
                return true;
            });
        },

        toggleRoleFilter(roleId) {
            const idx = this.filterRoles.indexOf(roleId);
            if (idx >= 0) this.filterRoles.splice(idx, 1);
            else this.filterRoles.push(roleId);
        },

        hasRole(user, roleId) {
            if (!user.roles) return false;
            return user.roles.split(',').map(r => r.trim()).includes(roleId);
        },

        async toggleRole(user, roleId) {
            let roleList = user.roles ? user.roles.split(',').map(r => r.trim()).filter(Boolean) : [];
            const idx = roleList.indexOf(roleId);
            if (idx >= 0) roleList.splice(idx, 1);
            else roleList.push(roleId);
            const resp = await fetch(`/api/users/${user.id}/roles`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roles: roleList })
            });
            if (resp.ok) { user.roles = roleList.join(','); }
            else { const d = await resp.json(); alert(d.error || 'Error'); }
        },

        startEdit(user) {
            user._editName = user.name;
            user._editEmail = user.email;
            user._editing = true;
        },

        async saveEdit(user) {
            const resp = await fetch(`/admin/users/${user.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: user._editEmail, name: user._editName })
            });
            if (resp.ok) {
                user.email = user._editEmail;
                user.name = user._editName;
                user._editing = false;
            } else { const d = await resp.json(); alert(d.error || 'Error'); }
        },

        async savePw(user) {
            if (!user._newPw) return;
            const resp = await fetch(`/admin/users/${user.id}/password`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: user._newPw })
            });
            if (resp.ok) { user._changingPw = false; user._newPw = ''; alert('Password updated'); }
            else { const d = await resp.json(); alert(d.error || 'Error'); }
        },

        async toggleDisabled(user) {
            const resp = await fetch(`/admin/users/${user.id}/disabled`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ disabled: !user.disabled })
            });
            if (resp.ok) { user.disabled = !user.disabled; }
            else { const d = await resp.json(); alert(d.error || 'Error'); }
        },

        async deleteUser(user) {
            if (!confirm(`Delete user ${user.name}? This cannot be undone.`)) return;
            const resp = await fetch(`/admin/users/${user.id}`, { method: 'DELETE' });
            if (resp.ok) { this.users = this.users.filter(u => u.id !== user.id); }
            else { const d = await resp.json(); alert(d.error || 'Error'); }
        }
    };
}
</script>
{{end}}
{{end}}
